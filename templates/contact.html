{% extends 'base.html' %}
{% block content %}

<div class="text-center mb-4">
  <h1 class="page-title">Contact <span style="color:#06b6d4">Us</span></h1>
  <p class="page-subtitle">Have a question or request? We'd love to hear from you.</p>
</div>

<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">

    <div class="card p-4 mb-3">
      <form method="post" action="/contact">

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-chat-left-text me-1"></i>Your Request</label>
          <textarea class="form-control" name="request" rows="4" placeholder="Describe your request here..."></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person me-1"></i>Your Name</label>
          <input class="form-control" type="text" name="name" placeholder="Enter your full name">
        </div>

        <div class="mb-4">
          <label class="form-label"><i class="bi bi-envelope me-1"></i>Email Address</label>
          <input class="form-control" type="email" name="email" placeholder="you@example.com">
        </div>

        <button class="btn btn-primary w-100" type="submit">
          <i class="bi bi-send me-2"></i>Send Message
        </button>

      </form>
    </div>


  </div>
</div>

{% endblock %}
