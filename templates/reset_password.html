
 {% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-center align-items-center min-vh-100 px-2">

  <div class="auth-card w-100" style="max-width:400px;">

    <div class="auth-header text-center text-white py-3"
         style="background:linear-gradient(135deg,#10b981,#059669,#0284c7)">
      <i class="bi bi-shield-lock-fill fs-3"></i>
      <p class="mt-2 mb-0 small">Create a new strong password</p>
    </div>

    <div class="auth-body p-3">

      <form method="post">

        <input type="password" name="password"
               class="form-control mb-3"
               placeholder="New Password" required>

        <input type="password" name="cpassword"
               class="form-control mb-3"
               placeholder="Confirm Password" required>

        <button class="btn btn-success w-100">
          Reset Password
        </button>

      </form>

      <hr>

      <p class="text-center small mb-0">
        <a href="/login">Back to Login</a>
      </p>

    </div>

  </div>

</div>

{% endblock %}
