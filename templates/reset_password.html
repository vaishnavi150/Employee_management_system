{% extends 'base.html' %}
{% block content %}
<div class="auth-outer">
  <div class="auth-card">

    <div class="auth-header" style="background:linear-gradient(135deg,#10b981,#059669,#0284c7)">
      <div class="auth-logo"><i class="bi bi-shield-lock-fill"></i></div>
      <div class="auth-tagline">Create a new strong password for your account.</div>
    </div>

    <div class="auth-body">
      <form method="post">

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-lock me-1"></i>New Password</label>
          <input class="form-control" type="password" name="password" placeholder="Enter new password" required>
        </div>

        <div class="mb-4">
          <label class="form-label"><i class="bi bi-lock-fill me-1"></i>Confirm Password</label>
          <input class="form-control" type="password" name="cpassword" placeholder="Re-enter new password" required>
        </div>

        <button class="btn btn-success w-100 mb-3" type="submit">
          <i class="bi bi-check-circle me-2"></i>Reset Password
        </button>

      </form>

      <hr class="divider">

      <p class="text-center mb-0" style="font-size:0.87rem;">
        Back to
        <a href="/login" class="ms-1 fw-semibold"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
