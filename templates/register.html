{% extends 'base.html' %}
{% block content %}

<div class="auth-outer">
  <div class="auth-card" style="max-width:490px">

    <div class="auth-header">
      <div class="auth-logo"><i class="bi bi-person-plus-fill"></i></div>
      <div class="auth-tagline">Create a new account to get started.</div>
    </div>

    <div class="auth-body">
      <form method="post" action="/register">

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-envelope me-1"></i>Email Address</label>
          <input class="form-control" type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person me-1"></i>Username</label>
          <input class="form-control" type="text" name="username" placeholder="Choose a username" required>
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
          <input class="form-control" type="password" name="password" placeholder="Create a strong password" required>
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-lock-fill me-1"></i>Confirm Password</label>
          <input class="form-control" type="password" name="cpassword" placeholder="Re-enter your password" required>
        </div>

        <div class="mb-4">
          <label class="form-label"><i class="bi bi-shield-check me-1"></i>Role</label>
          <select class="form-select" name="role">
              <option value="emp">Select Your Role</option>
            <option value="admin">Admin</option>
            <option value="emp">Employee</option>
          </select>
        </div>

        <button class="btn btn-primary w-100 mb-3" type="submit">
          <i class="bi bi-person-check me-2"></i>Register
        </button>

      </form>

      <hr class="divider">

      <p class="text-center mb-0" style="font-size:0.87rem;">
        Already have an account?
        <a href="/login" class="ms-1 fw-semibold"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
      </p>
    </div>

  </div>
</div>

{% endblock %}
