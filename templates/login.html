{% extends 'base.html' %}
{% block content %}

<div class="auth-outer">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo"><i class="bi bi-shield-lock-fill"></i></div>
      <div class="auth-tagline">Sign in to manage your team.</div>
    </div>

    <div class="auth-body">
      <form action="/login" method="post">

        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person me-1"></i>Username</label>
          <input class="form-control" type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>

        <div class="mb-4">
          <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
          <input class="form-control" type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button class="btn btn-primary w-100 mb-3" type="submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>

      </form>

      <hr class="divider">

      <div class="d-flex justify-content-between" style="font-size:0.87rem;">
        <a href="/forgot_password"><i class="bi bi-key me-1"></i>Forgot Password?</a>
        <a href="/register"><i class="bi bi-person-plus me-1"></i>Register</a>
      </div>
    </div>

  </div>
</div>

{% endblock %}
