{% extends 'base.html' %}
{% block content %}

<div class="auth-outer">
  <div class="auth-card">

    <div class="auth-header" style="background:linear-gradient(135deg,#7c3aed,#f97316,#f59e0b)">
      <div class="auth-logo"><i class="bi bi-key-fill"></i></div>
      <div class="auth-tagline">Enter your email to receive a reset link.</div>
    </div>

    <div class="auth-body">
      <form action="/forgot_password" method="post">

        <div class="mb-4">
          <label class="form-label"><i class="bi bi-envelope me-1"></i>Email Address</label>
          <input class="form-control" type="email" name="email" placeholder="you@example.com" required autofocus>
        </div>

        <button class="btn btn-primary w-100 mb-3" type="submit">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>

      </form>

      <hr class="divider">

      <p class="text-center mb-0" style="font-size:0.87rem;">
        Remember your password?
        <a href="/login" class="ms-1 fw-semibold"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
      </p>
    </div>

  </div>
</div>

{% endblock %}
